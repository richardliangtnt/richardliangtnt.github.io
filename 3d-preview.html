    <section class="project-hero preview-hero">
      <p class="eyebrow">3D Preview</p>
      <h1>3D 作品小镇预览</h1>
      <p>这是一个独立预览页，用来测试真正 <span class="notranslate" translate="no">3D</span> 风格是否适合放进主页。拖动可旋转视角，滚轮缩放，<span class="notranslate" translate="no">WASD</span> / 方向键移动小车，点击建筑查看项目。</p>

    <section class="three-preview-shell">
      <div class="three-preview-toolbar">

        <aside class="three-project-card" data-three-card>
          <div class="tag-row" data-three-tags></div>
          <h2 data-three-title>已发表研究室</h2>
          <p data-three-summary></p>
          <p><strong>状态：</strong><span data-three-status></span></p>
