<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>梁飞作品集分享图</title>
  <style>
    * { box-sizing: border-box; }
    html,
    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
    }
    body {
      color: #1f2733;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, rgba(47, 111, 237, .06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(47, 138, 104, .05) 1px, transparent 1px),
        radial-gradient(circle at 12% 12%, rgba(47, 111, 237, .20), transparent 26%),
        radial-gradient(circle at 90% 20%, rgba(47, 138, 104, .18), transparent 24%),
        radial-gradient(circle at 72% 82%, rgba(240, 139, 69, .18), transparent 30%),
        linear-gradient(135deg, #fbfcff 0%, #fff8f1 58%, #f7f9fc 100%);
      background-size: 42px 42px, 42px 42px, auto, auto, auto, auto;
    }
    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 68px 84px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 30px;
      font-weight: 900;
    }
    .mark {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, #2f6fed, #2f8a68 56%, #f08b45);
      box-shadow: 0 22px 40px rgba(47, 111, 237, .24);
      font-size: 23px;
      font-weight: 950;
    }
    .eyebrow {
      margin: 54px 0 12px;
      color: #2f6fed;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    h1 {
      max-width: 720px;
      margin: 0;
      font-size: 74px;
      line-height: .98;
      letter-spacing: 0;
    }
    p {
      max-width: 690px;
      margin: 24px 0 0;
      color: #526072;
      font-size: 27px;
      line-height: 1.48;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }
    .tag {
      padding: 9px 14px;
      border-radius: 999px;
      color: #334155;
      background: rgba(255, 255, 255, .78);
      box-shadow: 0 12px 30px rgba(31, 39, 51, .10);
      font-size: 20px;
      font-weight: 850;
    }
    .map {
      position: absolute;
      right: 84px;
      bottom: 78px;
      width: 360px;
      height: 250px;
      transform: rotate(-8deg) skewX(-8deg);
      border-radius: 30px;
      background: linear-gradient(135deg, #fff8df, #ffd6ad);
      box-shadow: 0 28px 0 rgba(180, 91, 40, .28), 0 48px 60px rgba(120, 62, 28, .20);
    }
    .road {
      position: absolute;
      left: 42px;
      top: 116px;
      width: 276px;
      height: 28px;
      border-radius: 8px;
      background: #f1bc87;
    }
    .road::after {
      content: "";
      position: absolute;
      left: 128px;
      top: -76px;
      width: 28px;
      height: 174px;
      border-radius: 8px;
      background: #f1bc87;
    }
    .building {
      position: absolute;
      width: 58px;
      height: 54px;
      border-radius: 8px;
      box-shadow: 10px 14px 0 rgba(81, 47, 28, .16);
    }
    .building::before {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      top: -17px;
      height: 22px;
      border-radius: 6px;
      background: inherit;
      filter: brightness(.88);
      transform: skewX(-18deg);
    }
    .b1 { left: 54px; top: 58px; background: #2f6fed; }
    .b2 { left: 162px; top: 44px; background: #6757c8; }
    .b3 { right: 48px; top: 86px; background: #2f8a68; }
    .b4 { left: 104px; bottom: 44px; background: #b97124; }
    .car {
      position: absolute;
      left: 178px;
      top: 134px;
      width: 44px;
      height: 28px;
      border: 4px solid #7a3328;
      border-radius: 8px;
      background: #d64d42;
      transform: rotate(12deg);
      box-shadow: 0 14px 18px rgba(92, 48, 27, .22);
    }
    .note {
      position: absolute;
      left: 84px;
      bottom: 34px;
      color: #806553;
      font-size: 20px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="mark">FL</span><span>梁飞个人作品集</span></div>
    <div class="eyebrow">Code, Research and AI Experiments</div>
    <h1>我在代码里探索真实问题</h1>
    <p>路径优化、强化学习、ROS、IoT 与 Python 工程实践。一个由 AI Agent 协助构建的长期作品集。</p>
    <div class="tags">
      <span class="tag">SCIE / JCR Q1</span>
      <span class="tag">EVRPTW</span>
      <span class="tag">ROS</span>
      <span class="tag">IoT</span>
      <span class="tag">Python</span>
    </div>
    <div class="map">
      <div class="road"></div>
      <span class="building b1"></span>
      <span class="building b2"></span>
      <span class="building b3"></span>
      <span class="building b4"></span>
      <span class="car"></span>
    </div>
    <div class="note">AI Agent built · 梁飞提供资料与少量修改</div>
  </div>
</body>
</html>
